<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀴즈 관리자</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh; color: #e0e0e0;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0 30px; }
        header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #ff6b6b, #ffc947);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
        }
        header p { color: #999; font-size: 0.95rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 24px; text-align: center; backdrop-filter: blur(10px); }
        .stat-value { font-size: 2.2rem; font-weight: 700; margin-bottom: 4px; }
        .stat-value.blue { color: #00d2ff; } .stat-value.green { color: #00d264; } .stat-value.yellow { color: #ffc947; }
        .stat-label { color: #888; font-size: 0.9rem; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .toolbar h2 { font-size: 1.2rem; }
        .toolbar-btns { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: rgba(255,255,255,0.12); }
        .btn-danger { border-color: rgba(255,80,80,0.4); color: #ff6b6b; }
        .btn-danger:hover { background: rgba(255,80,80,0.15); }
        .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
        .auto-refresh { color: #666; font-size: 0.8rem; }
        #round-filter { padding: 10px 16px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 0.9rem; outline: none; }
        #round-filter option { background: #1a1a2e; color: #e0e0e0; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.03); border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
        thead th { background: rgba(255,255,255,0.06); padding: 14px 16px; text-align: left; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; }
        tbody td { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        tbody tr:hover { background: rgba(255,255,255,0.04); }
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; font-weight: 700; font-size: 0.85rem; }
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #1a1a2e; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #1a1a2e; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #a0622e); color: #fff; }
        .rank-other { background: rgba(255,255,255,0.1); color: #aaa; }
        .score-bar-container { display: flex; align-items: center; gap: 10px; }
        .score-bar { flex: 1; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .score-text { font-weight: 600; min-width: 60px; text-align: right; }
        .round-badge { display: inline-block; background: rgba(123,47,247,0.2); color: #b388ff; padding: 2px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }
        .time-col { color: #888; font-size: 0.85rem; } .ip-col { color: #666; font-size: 0.8rem; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state p { font-size: 1.1rem; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>퀴즈 관리자 대시보드</h1>
            <p>퀴즈 결과 실시간 현황</p>
        </header>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value blue" id="stat-total">0</div><div class="stat-label">총 응시자</div></div>
            <div class="stat-card"><div class="stat-value green" id="stat-avg">-</div><div class="stat-label">평균 점수</div></div>
            <div class="stat-card"><div class="stat-value yellow" id="stat-top">-</div><div class="stat-label">최고 점수</div></div>
        </div>
        <div class="toolbar">
            <h2>순위표</h2>
            <div class="toolbar-btns">
                <select id="round-filter" onchange="loadResults()"><option value="0">전체 회차</option></select>
                <span class="auto-refresh">5초마다 자동 갱신</span>
                <button class="btn" onclick="loadResults()">새로고침</button>
                <button class="btn btn-danger" onclick="clearResults()">전체 초기화</button>
            </div>
        </div>
        <div id="table-area">
            <div class="empty-state" id="empty-state"><p>아직 응시자가 없습니다</p></div>
            <table id="result-table" style="display:none;">
                <thead><tr>
                    <th style="width:50px;">순위</th><th style="width:70px;">회차</th>
                    <th>이름 (IP)</th><th style="width:220px;">점수</th><th style="width:140px;">제출 시간</th><th style="width:60px;"></th>
                </tr></thead>
                <tbody id="result-body"></tbody>
            </table>
        </div>
    </div>
<script>
async function loadRoundFilter() {
    const rounds = await (await fetch('/api/rounds')).json();
    const sel = document.getElementById('round-filter');
    const cur = sel.value;
    sel.innerHTML = '<option value="0">전체 회차</option>';
    rounds.forEach(r => { const o = document.createElement('option'); o.value = r.round; o.textContent = `${r.round}회차`; sel.appendChild(o); });
    sel.value = cur;
}
async function loadResults() {
    const round = document.getElementById('round-filter').value;
    const data = await (await fetch(round > 0 ? `/api/results?round=${round}` : '/api/results')).json();
    document.getElementById('stat-total').textContent = data.length;
    if (!data.length) {
        document.getElementById('stat-avg').textContent = '-';
        document.getElementById('stat-top').textContent = '-';
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('result-table').style.display = 'none';
        return;
    }
    const scores = data.map(d => d.score);
    document.getElementById('stat-avg').textContent = (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
    const top = Math.max(...scores);
    document.getElementById('stat-top').textContent = `${top} / ${data.find(d=>d.score===top).total}`;
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('result-table').style.display = 'table';
    const tbody = document.getElementById('result-body');
    tbody.innerHTML = '';
    data.forEach(r => {
        const tr = document.createElement('tr');
        const pct = (r.score/r.total)*100;
        const barColor = pct>=90?'#00d2ff':pct>=70?'#00d264':pct>=50?'#ffc947':'#ff6464';
        const rankClass = r.rank<=3?`rank-${r.rank}`:'rank-other';
        const time = new Date(r.submitted_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        tr.innerHTML = `
            <td><span class="rank-badge ${rankClass}">${r.rank}</span></td>
            <td><span class="round-badge">${r.round}회차</span></td>
            <td><span style="font-weight:600;">${r.name}</span> <span class="ip-col">(${r.ip||'?'})</span></td>
            <td><div class="score-bar-container"><div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${barColor};"></div></div><span class="score-text">${r.score} / ${r.total}</span></div></td>
            <td class="time-col">${time}</td>
            <td><button class="btn btn-sm btn-danger" onclick="deleteResult(${r.id})" title="삭제">✕</button></td>`;
        tbody.appendChild(tr);
    });
}
async function deleteResult(id) {
    if (!confirm('이 결과를 삭제하시겠습니까?')) return;
    await fetch(`/api/results/${id}`, { method: 'DELETE' });
    loadResults();
}
async function clearResults() {
    if (!confirm('정말 모든 결과를 초기화하시겠습니까?')) return;
    await fetch('/api/results', { method: 'DELETE' });
    loadResults();
}
loadRoundFilter(); loadResults(); setInterval(loadResults, 5000);
</script>
</body>
</html>
