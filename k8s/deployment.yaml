apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-app-deployment
  namespace: quiz-app
  labels:
    app: quiz-app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1  # 기존 Pod 종료 후 새 Pod 생성
      maxSurge: 0        # 동시에 새 Pod 생성 금지
  selector:
    matchLabels:
      app: quiz-app
  template:
    metadata:
      labels:
        app: quiz-app
    spec:
      containers:
        - name: quiz-app
          image: quiz-app:latest
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: quiz-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/rounds
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/rounds
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
      volumes:
        - name: quiz-data
          persistentVolumeClaim:
            claimName: quiz-app-pvc
