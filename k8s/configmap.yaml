apiVersion: v1
kind: ConfigMap
metadata:
  name: quiz-questions
  namespace: quiz-app
  labels:
    app: quiz-app
data:
  1.md: |
    # 관측 가능성과 근본 원인 분석으로 완성하는 AIOps 스터디 1차 퀴즈

    <!-- 
    문제 작성 양식:
      ##
      질문 내용
      - 오답 선택지
      - 오답 선택지
      * 정답 선택지 (* 표시)
      - 오답 선택지

    규칙:
      - ## 으로 시작하면 출제되는 문제
      - ##! 으로 시작하면 제외되는 문제 (주석처리)
      - 그 다음 줄에 질문을 씁니다
      - 선택지는 - 또는 * 로 시작합니다
      - * 로 시작하는 선택지가 정답입니다 (문제당 1개)
      - 선택지 순서는 자유롭게 배치하세요
      - 번호는 자동으로 매겨집니다
      - > 로 시작하는 줄은 해설입니다 (선택지 아래에 작성)
    -->

    ##
    관측가능성에서 'Signal'이라 불리는 세 가지 핵심 데이터 유형이 아닌 것은?
    - Traces
    - Metrics
    - Logs
    * Alerts
    > 관측가능성의 세 가지 핵심 신호(Signal)는 Traces, Metrics, Logs이다. Alerts는 이 신호들을 기반으로 만들어지는 알림 기능이지 신호 자체가 아니다.

    ##
    관측가능성에서 분산 트레이싱의 가장 기본이 되는 단위는?
    - Trace
    * Span
    - Context
    - Baggage
    > Span은 하나의 작업 단위(API 호출, DB 쿼리 등)를 나타내며, 여러 Span이 모여 하나의 Trace를 구성한다. Context는 Span 간 연결 정보를 전파하는 메커니즘이고, Baggage는 서비스 간 전달되는 사용자 정의 키-값 데이터이다.

    ##
    근본 원인 분석(Root Cause Analysis)에서 관측가능성 데이터의 '상관관계(Correlation)'가 중요한 이유는?
    - 동일한 유형의 데이터를 중복 저장하지 않아 저장 비용을 절감할 수 있으므로
    * 서로 다른 신호(로그, 메트릭, 트레이스) 간의 연결을 통해 문제의 원인을 빠르게 좁힐 수 있으므로
    - 여러 데이터 소스를 하나의 대시보드에 통합하여 시각적으로 보기 좋게 구성할 수 있으므로
    - 메트릭 임계값 기반으로 알림 규칙을 자동으로 생성하여 수동 설정을 줄일 수 있으므로
    > 상관관계는 메트릭에서 이상을 발견하면 해당 시점의 트레이스를 찾고, 트레이스에서 문제 스팬의 로그를 확인하는 식으로 신호 간 연결을 통해 근본 원인까지 빠르게 도달하게 해준다.

    ##
    USE 메서드(Utilization 이용률, Saturation 포화도, Errors 에러)는 주로 어떤 종류의 문제 분석에 적합한가?
    - 애플리케이션 코드의 비즈니스 로직 오류와 예외 처리 누락 문제
    - API 요청·응답의 데이터 형식 불일치와 직렬화 오류 문제
    * 서버·인프라 리소스(CPU, 메모리, 디스크, 네트워크) 관련 성능 문제
    - 프론트엔드 렌더링 성능 저하와 UI 컴포넌트의 상태 관리 버그
    > USE 메서드는 Brendan Gregg가 제안한 방법론으로, 모든 리소스에 대해 이용률(Utilization), 포화도(Saturation), 에러(Errors)를 체크하여 시스템 수준의 성능 병목을 찾는 데 최적화되어 있다.

    ##
    방화벽 설정 오류로 외부 요청이 들어오지 않는 상황에서, USE 메서드(Utilization 이용률, Saturation 포화도, Errors 에러)만으로 모니터링하면 어떤 문제가 발생하는가?
    - USE 메서드의 Errors 지표가 급증하여 즉시 장애를 감지할 수 있다
    - USE 메서드의 Utilization은 리소스 과부하를 감지하는 지표이므로 트래픽 감소도 자동 경고한다
    - 방화벽은 인프라 영역이므로 USE 메서드의 Saturation 지표에 자동 반영된다
    * CPU·메모리·네트워크 사용률이 양호해 USE 지표는 정상이지만, 실제로는 서비스 장애이다.
    > USE 메서드는 시스템 리소스 관점의 모니터링이라 요청이 아예 들어오지 않으면 리소스 사용이 낮아 "정상"으로 보인다. 이런 경우 서비스 관점의 RED 메서드(Rate=0 감지)가 필요하다.

    ##
    관측가능성 대시보드에서 RED 메서드가 모니터링하는 세 가지 지표는?
    - Resources, Errors, Duration
    * Rate, Errors, Duration
    - Requests, Events, Data
    - Rate, Exceptions, Delays
    > RED 메서드는 Tom Wilkie가 제안한 서비스 관점 모니터링 방법론이다. Rate(초당 요청 수), Errors(실패한 요청), Duration(요청 처리 시간)을 측정한다.

    ##
    USE 메서드와 RED 메서드의 관계에 대한 설명으로 가장 적절한 것은?
    - RED 메서드가 USE 메서드를 포함하므로 RED 메서드만 사용하면 충분하다
    - USE 메서드가 시스템과 서비스를 모두 커버하므로 단독 사용이 권장된다
    - 두 메서드는 동일한 관점에서 모니터링하므로 하나만 선택하면 된다
    * USE는 시스템(인프라) 관점, RED는 서비스 관점으로 서로 보완하므로 둘 다 함께 사용하는 것이 좋다
    > USE는 CPU·메모리 같은 인프라 리소스를 모니터링하고, RED는 요청 수·에러·지연 같은 서비스 수준을 모니터링한다. 둘을 함께 사용해야 시스템과 서비스 양쪽의 문제를 빠짐없이 감지할 수 있다.

    ##
    근본 원인 분석 과정에서 '문제 영역 식별(Problem Domain Identification)'단계의 주된 목적은?
    - 장애를 유발한 코드를 직접 찾아 즉시 수정 배포하는 것
    - 동일한 장애 재발 방지를 위한 알림 임계값을 설정하는 것
    * 어떤 서비스나 컴포넌트에서 문제가 발생했는지 범위를 좁히는 것
    - 문제와 관련 없는 과거 로그를 정리하여 분석 속도를 높이는 것
    > 근본 원인 분석의 첫 단계는 문제 영역 식별이다. 대시보드와 메트릭을 통해 어떤 서비스에서 이상이 발생했는지 범위를 좁힌 후, 개별 요청 분석과 하위 수준 이해로 진행한다.

    ##
    근본 원인 분석에서 '개별 요청 분석' 단계에서 주로 활용하는 관측가능성 신호는?
    - 메트릭(Metrics)만으로 집계된 수치 추이를 확인하여 분석
    - 로그(Logs)만으로 개별 서비스의 텍스트 기록을 순차적으로 분석
    * 분산 트레이스(Distributed Traces)를 중심으로 로그와 메트릭을 함께 분석
    - 프로파일(Profiles)만으로 코드 수준의 리소스 사용 패턴을 분석
    > 개별 요청 분석 단계에서는 분산 트레이스로 요청의 전체 흐름과 병목을 파악하고, 해당 스팬에 연결된 로그와 메트릭을 함께 확인하여 문제 원인을 구체화한다.

    ##
    근본 원인 분석의 '하위 수준 이해(Low-level Understanding)' 단계에서 가장 유용한 도구는?
    - 대시보드
    - 알림 시스템
    * 프로파일러 및 디버거
    - 로드밸런서
    > 하위 수준 이해 단계는 트레이스와 로그로 문제 영역을 좁힌 후, 프로파일러(CPU/메모리 병목)와 디버거(코드 로직)로 정확한 코드 수준의 원인을 파악하는 단계이다.

    ##
    구조화된 로그(Structured Log)의 장점으로 가장 적절한 것은?
    - 키-값 형태라 사람이 자연어 로그보다 직관적으로 읽기 편하다
    - JSON 등 포맷을 사용하면 비구조화 로그보다 저장 공간을 덜 차지한다
    * 기계가 파싱하고 검색·필터링하기 쉬워 자동화된 분석에 유리하다
    - 직렬화 과정이 단순해서 비구조화 로그보다 항상 빠르게 기록된다
    > 구조화된 로그(예: JSON)는 키-값 쌍으로 되어 있어 기계적 파싱, 인덱싱, 필터링이 용이하다. 사람이 읽기엔 오히려 자연어 로그가 편하고, JSON 등의 오버헤드로 저장 공간은 더 클 수 있다.

    ##
    프로파일링(Profiling)이 근본 원인 분석에서 유용한 이유는?
    - 분산 트레이싱으로는 알 수 없는 서비스 간 네트워크 지연 원인을 프로파일링으로 식별할 수 있어서
    * 코드 수준에서 CPU, 메모리 등 리소스 소비의 병목 지점을 정확히 파악할 수 있어서
    - 메트릭 대시보드보다 더 정확한 실시간 리소스 사용률 모니터링이 가능해서
    - 프로파일 데이터를 기반으로 장애 발생 시 자동 롤백을 수행할 수 있어서
    > 프로파일링은 함수별 CPU 시간, 메모리 할당 등을 분석하여 어떤 코드가 리소스를 가장 많이 소비하는지 정확히 보여준다. 트레이스가 서비스 간 흐름을 보여준다면, 프로파일링은 서비스 내부의 코드 수준 병목을 보여준다.

    ##
    디버깅(Debugging)과 관측가능성(Observability)의 관계로 가장 적절한 설명은?
    - 디버깅은 런타임 데이터를 직접 수집하므로 관측가능성을 완전히 대체한다
    - 관측가능성은 시스템 전체, 디버깅은 코드만 다루므로 서로 무관하다
    * 관측가능성이 문제 범위를 좁혀주면 디버깅으로 코드 수준의 원인을 확인한다
    - 디버거의 브레이크포인트와 스텝 실행만으로 분산 시스템 문제를 해결한다
    > 관측가능성은 분산 시스템 전체에서 문제가 어디인지 범위를 좁히고, 디버깅은 그 범위 안에서 코드 로직의 정확한 원인을 찾는다. 둘은 대체 관계가 아니라 보완 관계이다.

    ##
    관측가능성에서 '이벤트(Event)'와 '로그(Log)'의 차이로 가장 적절한 것은?
    - 이벤트와 로그는 저장 형식과 의미가 동일하며 용어만 다르게 사용하는 것이다
    * 이벤트는 비즈니스적으로 의미 있는 특정 행위를 나타내며 로그보다 더 구조화되고 의도적으로 기록된다
    - 로그는 항상 구조화된 형태로 기록되므로 이벤트보다 검색과 분석에 더 적합하다
    - 이벤트는 메트릭 집계의 원본 데이터로 카운터나 히스토그램으로 변환되는 것이다
    > 로그는 시스템이 자동으로 남기는 기록인 반면, 이벤트는 "주문 완료", "결제 실패" 같은 비즈니스적으로 의미 있는 행위를 의도적으로 기록한 것이다.

    ##
    관측가능성에서 '이상치(Anomaly) 탐지'의 주된 목적은?
    - 정상 트래픽 패턴의 기준선을 기록하여 향후 용량 계획에 활용하기 위해
    - 대시보드 그래프에 통계적 밴드를 표시하여 시각적 가독성을 높이기 위해
    * 정상 범위를 벗어난 비정상적인 패턴을 자동으로 감지하여 잠재적 문제를 조기에 발견하기 위해
    - 반복되는 정상 로그를 필터링하여 저장소 사용량과 비용을 줄이기 위해
    > 이상치 탐지는 정상 패턴의 기준선(baseline)을 학습한 후, 이를 벗어나는 비정상 패턴을 자동으로 감지한다. 고정 임계값 알림과 달리 계절적 변화나 추세를 반영할 수 있어 오탐을 줄인다.

    ##
    근본 원인 분석에서 데이터 모델이 중요한 이유는?
    - 텔레메트리 저장용 데이터베이스의 스키마를 최적화하여 쿼리 성능을 높이기 위해
    * 로그, 메트릭, 트레이스 간의 관계를 일관되게 정의하여 신호 간 상관 분석을 가능하게 하므로
    - 관측가능성 대시보드의 UI 레이아웃과 위젯 배치를 체계적으로 설계하기 위해
    - 텔레메트리 데이터 전송에 최적화된 네트워크 프로토콜을 선택하기 위해
    > 데이터 모델은 로그·메트릭·트레이스가 공통 속성(서비스명, Trace ID 등)으로 연결되도록 정의하여, 한 신호에서 다른 신호로 자연스럽게 전환하며 분석할 수 있게 해준다.

    ##
    관측가능성 기술 스택에서 'Grafana'의 주된 역할은?
    - 호스트에 설치되어 메트릭과 로그를 수집·전송하는 데이터 수집 에이전트
    - 분산 트레이싱 데이터를 저장하고 쿼리할 수 있는 트레이싱 백엔드
    * 메트릭, 로그, 트레이스 등 다양한 데이터 소스의 시각화 및 대시보드 제공
    - 비구조화 로그를 구조화된 형태로 변환하는 로그 파싱 엔진
    > Grafana는 데이터를 직접 수집하거나 저장하지 않고, Prometheus·Loki·Tempo 등 다양한 데이터 소스에 연결하여 시각화와 대시보드를 제공하는 도구이다.

    ##
    분산 시스템에서 근본 원인 분석이 특히 어려운 이유는?
    * 하나의 요청이 여러 서비스를 거치므로 장애 지점과 실제 원인이 다른 서비스에 있을 수 있어서
    - 문제가 항상 단일 서버에서만 발생하므로 원인 파악이 쉬워 분석이 불필요해서
    - 분산 시스템에서는 보안상 이유로 로그가 기본적으로 비활성화되어 수집이 안 돼서
    - 모든 서비스가 동일한 언어와 프레임워크로 작성되어 동일한 에러 패턴만 발생해서
    > 분산 시스템에서는 서비스 A에서 에러가 발생해도 실제 원인은 서비스 B의 지연이나 서비스 C의 잘못된 응답일 수 있다. 이런 인과 관계 추적이 근본 원인 분석을 어렵게 만든다.

    ##
    Trace-Log 상관관계를 구현하는 일반적인 방법은?
    - 로그 파일 이름에 트레이스 ID를 포함시켜 파일 단위로 트레이스를 구분한다
    * 로그 메시지에 Trace ID와 Span ID를 포함시켜 특정 트레이스의 로그만 필터링할 수 있게 한다
    - 트레이스와 로그를 별도의 독립된 시스템에 저장하여 상호 참조 없이 개별 분석한다
    - 수집된 로그를 자동으로 트레이스 형태의 스팬 데이터로 변환하여 통합 저장한다
    > 로그에 Trace ID/Span ID를 삽입하면, 특정 요청의 트레이스를 보다가 해당 스팬 시점의 로그만 필터링하여 상세 정보를 확인할 수 있다. 이것이 Trace-Log 상관관계의 핵심이다.

    ##
    근본 원인 분석에서 '5 Whys' 기법의 핵심 원리는?
    - 5개의 서로 다른 관측가능성 도구를 조합하여 다각도로 분석하는 것
    - 5명의 엔지니어가 각자 다른 관점에서 동시에 분석하여 결과를 종합하는 것
    * "왜?"라는 질문을 반복하여 표면적 증상이 아닌 근본적인 원인에 도달하는 것
    - 장애 발생 후 5분 이내에 근본 원인을 파악하고 해결까지 완료하는 것
    > 5 Whys는 도요타에서 유래한 기법으로, "왜?"를 반복 질문하여 표면적 증상에서 근본 원인까지 파고든다. 예: 서버 다운 → 왜? 메모리 부족 → 왜? 메모리 누수 → 왜? 커넥션 풀 미반환 → 근본 원인 도달.

    ##
    마이크로서비스에서 외부 서비스와의 통신 시 타임아웃 설정 전략으로 가장 적절한 것은?
    - POST 요청은 짧은 타임아웃, GET 요청은 긴 타임아웃을 설정하여 데이터 변경 작업의 응답 지연을 최소화한다
    - 모든 요청에 동일한 타임아웃을 설정하되, 서킷브레이커로 요청 유형별 차이를 보완하는 것이 관리에 유리하다
    * GET 요청은 짧은 타임아웃, POST 요청은 긴 타임아웃을 설정하여 조회는 신속하게, 데이터 변경에는 충분한 시간을 확보한다
    - 타임아웃을 충분히 길게 설정하고 재시도(retry) 횟수를 늘려야 외부 서비스의 일시적 장애에도 안정적으로 처리할 수 있다
    > GET은 데이터 조회로 빠른 응답이 기대되므로 짧은 타임아웃, POST는 데이터 변경·처리가 포함되어 더 오래 걸릴 수 있으므로 긴 타임아웃을 설정한다. 타임아웃이 없거나 너무 길면 외부 서비스 장애 시 서버 리소스가 고갈될 수 있다.

    ##
    관측가능성에서 로그는 메트릭이나 트레이스보다 우선순위가 낮다고 여겨지지만, 로그만이 제공할 수 있는 고유한 가치는?
    - 구조화된 로그는 메트릭처럼 집계가 가능하므로 메트릭을 완전히 대체할 수 있다
    * 예외 스택트레이스, 비즈니스 컨텍스트 등 코드 수준의 상세한 실행 맥락을 비정형 텍스트로 기록할 수 있다
    - 로그에 Trace ID를 포함시키면 트레이스 없이도 서비스 간 호출 순서와 지연 시간을 정확히 파악할 수 있다
    - 로그 기반 알림은 메트릭 기반 알림보다 실시간성이 뛰어나 장애 탐지에 더 적합하다
    > 메트릭은 집계된 수치, 트레이스는 요청 흐름을 보여주지만, 예외 스택트레이스나 "사용자 X가 상품 Y를 주문" 같은 비정형 텍스트 기반의 상세 맥락은 로그만이 기록할 수 있다.

    ##
    리눅스 커널 안에서 동작하는 작은 프로그램을 동적으로 실행할 수 있는 기술로, 원래 패킷 필터링용이었으나 확장되어 커널 레벨의 네트워크, 시스템 콜, 스케줄링, 보안 이벤트 등을 관측할 수 있게 된 기술은?
    - kprobe
    * eBPF
    - cgroup
    - netfilter
    > eBPF(extended Berkeley Packet Filter)는 원래 네트워크 패킷 필터링용 BPF를 확장한 것으로, 커널 공간에서 안전하게 프로그램을 실행하여 네트워크, 시스템 콜, 스케줄링, 보안 이벤트 등을 저오버헤드로 관측할 수 있다.

    ##
    근본 원인 분석의 접근법 14가지 상관관계 중 애플리케이션(서비스)과 인프라(근본 원인 분석)를 연결하는 다리 역할을 하기 때문에 가장 높은 우선순위를 가지는 것은?
    - 메트릭에서 로그로 (Metrics → Logs)
    - 로그에서 프로파일로 (Logs → Profile)
    * 분산 추적에서 시스템 추적으로 (Distributed Traces → System Traces)
    - 서비스 맵에서 매트릭으로 (Service Map → Metrics)
    > 분산 추적(애플리케이션/서비스 수준)에서 시스템 추적(인프라 수준)으로의 상관관계는 서비스 장애의 원인이 인프라에 있는지 빠르게 연결해주므로 14가지 중 최우선순위이다.

    ##
    '이벤트에서 추적으로(Events → Traces)' 상관관계가 중요한 이유는?
    - 이벤트가 추적보다 수집 오버헤드가 낮아 추적을 대체할 수 있기 때문에
    - 추적 데이터를 이벤트 형식으로 변환하면 장기 보관 비용을 절감할 수 있기 때문에
    * 추적은 기술적 콘텍스트만 나타내는 한계가 있는데, 비즈니스 신호인 이벤트와 연결하면 기술과 비즈니스를 함께 이해할 수 있기 때문에
    - 하나의 추적이 여러 이벤트를 포함하므로 이벤트를 그룹화하는 기준으로 활용할 수 있기 때문에
    > 추적은 기술적 흐름(API 호출, DB 쿼리 등)만 보여주는 한계가 있다. 이벤트는 비즈니스 신호이므로, 이벤트→추적 상관관계를 통해 비즈니스 맥락과 기술적 흐름을 연결할 수 있다. 참고로 하나의 이벤트가 여러 추적을 포함한다(반대가 아님).

    ##
    주문 처리 시스템에서 특정 주문의 기술적 흐름을 분석하려 할 때, '이벤트에서 추적으로' 상관관계를 활용하는 방법으로 가장 적절한 것은?
    - 분산 추적의 스팬 이름을 주문 ID로 변경하여 검색이 쉽게 되도록 한다
    - 각 추적마다 별도의 이벤트를 자동 생성하여 1:1로 매핑한다
    * 주문 ID 같은 비즈니스 이벤트를 기준으로 해당 주문에 관련된 여러 추적을 조회한다
    - 추적 데이터에서 주문 관련 스팬만 필터링하여 새로운 이벤트로 저장한다
    > 하나의 주문(이벤트)은 결제, 재고 확인, 배송 등 여러 기술적 추적을 포함한다. 주문 ID라는 비즈니스 이벤트를 기준으로 관련 추적들을 조회하면 해당 주문의 전체 기술적 흐름을 파악할 수 있다.

    ##
    관측가능성에서 상관관계(Correlation) 사용의 장점으로 적절하지 않은 것은?
    - 서로 다른 신호를 연결하여 신속하게 근본 원인 분석을 수행할 수 있다
    - 상관관계가 깨지면 신호가 부정확하게 구성되거나 누락되었음을 의미하므로 신호의 정합성 검증과 품질 향상에 활용할 수 있다
    * 신호 간의 연결이 자동으로 이루어지므로 개발자가 각 신호의 목적과 데이터를 깊이 이해하지 않아도 쉽게 활용할 수 있다
    - 신호 간 연결을 통해 대시보드와 알람 구성이 더 체계적이고 쉬워진다
    > 상관관계는 근본 원인 분석 가속화, 신호 품질 검증, 대시보드·알람 구성 용이성 등의 장점이 있다. 하지만 각 신호는 목적과 데이터, 사용법이 다르기 때문에 이를 이해하고 상관관계를 구성하려면 복잡하고 많은 러닝 커브가 필요하다.
