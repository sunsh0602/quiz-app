apiVersion: v1
kind: Service
metadata:
  name: {{ include "quiz-app.fullname" . }}-svc
  labels:
    {{- include "quiz-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "quiz-app.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
